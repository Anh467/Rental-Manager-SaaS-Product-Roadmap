name: Client CI

on:
  pull_request:
    paths:
      - "client/rental-manager-web-app/**"
      - ".github/workflows/client-ci.yml"
  push:
    branches: [main]
    paths:
      - "client/rental-manager-web-app/**"

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/rental-manager-web-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/rental-manager-web-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
