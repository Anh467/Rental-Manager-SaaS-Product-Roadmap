name: Client CI

on:
  pull_request:
    paths:
      - "client/rental-manager-web-app/**"
      - ".github/workflows/client-ci.yml"
  push:
    branches: [main]
    paths:
      - "client/rental-manager-web-app/**"

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/rental-manager-web-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          npm run type-check 2>&1 | tee tsc.log

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-diagnostics
          path: |
            client/rental-manager-web-app/tsc.log
            client/rental-manager-web-app/build.log
          if-no-files-found: ignore
