name: Backend Dapper CI

on:
  pull_request:
    paths:
      - "server/Rental-Manager-Web-App/**"
      - ".github/workflows/backend-dapper-ci.yml"
  push:
    branches:
      - main
    paths:
      - "server/Rental-Manager-Web-App/**"
      - ".github/workflows/backend-dapper-ci.yml"

jobs:
  field-repository-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: RentalManager_Strong_Password_123!
        ports:
          - 1433:1433

    defaults:
      run:
        working-directory: server/Rental-Manager-Web-App

    env:
      RENTAL_MANAGER_TEST_CONNECTION_STRING: >-
        Server=localhost,1433;Database=master;User Id=sa;
        Password=RentalManager_Strong_Password_123!;
        Encrypt=False;TrustServerCertificate=True

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: >-
          dotnet restore
          tests/RentalManager.Modules.TenantManagement.Infrastructure.IntegrationTests/RentalManager.Modules.TenantManagement.Infrastructure.IntegrationTests.csproj

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build \
            tests/RentalManager.Modules.TenantManagement.Infrastructure.IntegrationTests/RentalManager.Modules.TenantManagement.Infrastructure.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --nologo 2>&1 | tee backend-dapper-build.log

      - name: Run Field CRUD integration tests
        run: >-
          dotnet test
          tests/RentalManager.Modules.TenantManagement.Infrastructure.IntegrationTests/RentalManager.Modules.TenantManagement.Infrastructure.IntegrationTests.csproj
          --configuration Release
          --no-build
          --nologo
          --logger "trx;LogFileName=field-repository-tests.trx"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-dapper-diagnostics
          path: |
            server/Rental-Manager-Web-App/backend-dapper-build.log
            server/Rental-Manager-Web-App/**/field-repository-tests.trx
          if-no-files-found: ignore
