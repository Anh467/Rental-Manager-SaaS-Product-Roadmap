name: Backend CI

on:
  pull_request:
    paths:
      - "server/Rental-Manager-Web-App/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "server/Rental-Manager-Web-App/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server/Rental-Manager-Web-App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore API dependency graph
        run: dotnet restore src/RentalManager.Api/RentalManager.Api.csproj

      - name: Build API dependency graph
        run: >-
          dotnet build
          src/RentalManager.Api/RentalManager.Api.csproj
          --configuration Release
          --no-restore
          --warnaserror
